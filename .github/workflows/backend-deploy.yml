name: Deploy Backend (SAM)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Check deploy configuration
        id: config
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          if [[ -n "$AWS_ROLE_TO_ASSUME" && -n "$AWS_REGION" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "AWS deploy config missing. Set AWS_ROLE_TO_ASSUME (secret) and AWS_REGION (variable)."
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ steps.config.outputs.configured == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup SAM CLI
        if: ${{ steps.config.outputs.configured == 'true' }}
        uses: aws-actions/setup-sam@v2

      - name: SAM Build
        if: ${{ steps.config.outputs.configured == 'true' }}
        run: sam build --template-file template.yaml
        working-directory: infra

      - name: SAM Deploy
        if: ${{ steps.config.outputs.configured == 'true' }}
        run: >-
          sam deploy
          --stack-name classroom-help-queue
          --resolve-s3
          --capabilities CAPABILITY_IAM
          --no-confirm-changeset
          --no-fail-on-empty-changeset
          --parameter-overrides AdminPin=${{ secrets.ADMIN_PIN }}
        working-directory: infra
