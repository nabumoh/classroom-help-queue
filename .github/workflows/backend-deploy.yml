name: Deploy Backend (SAM)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME != '' && secrets.AWS_ROLE_TO_ASSUME || 'arn:aws:iam::173322643459:role/github-actions-classroom-help-queue-deploy' }}
  ADMIN_PIN: ${{ secrets.ADMIN_PIN != '' && secrets.ADMIN_PIN || vars.ADMIN_PIN != '' && vars.ADMIN_PIN || '8391' }}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Resolve deploy configuration
        run: |
          echo "AWS_REGION=$AWS_REGION"
          if [[ -z "$AWS_ROLE_TO_ASSUME" ]]; then
            echo "AWS_ROLE_TO_ASSUME is empty"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM Build
        run: sam build --template-file template.yaml
        working-directory: infra

      - name: SAM Deploy
        run: |
          set -euo pipefail
          cmd=(
            sam deploy
            --stack-name classroom-help-queue
            --resolve-s3
            --capabilities CAPABILITY_IAM
            --no-confirm-changeset
            --no-fail-on-empty-changeset
          )

          # Only pass AdminPin when provided to avoid invalid parameter format.
          if [[ -n "${ADMIN_PIN:-}" ]]; then
            cmd+=(--parameter-overrides "AdminPin=${ADMIN_PIN}")
          fi

          "${cmd[@]}"
        working-directory: infra
