name: Deploy Frontend (S3 + CloudFront)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME != '' && secrets.AWS_ROLE_TO_ASSUME || 'arn:aws:iam::173322643459:role/github-actions-classroom-help-queue-deploy' }}
  FRONTEND_BUCKET: ${{ vars.FRONTEND_BUCKET != '' && vars.FRONTEND_BUCKET || 'nadeem-website-s3' }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' && vars.CLOUDFRONT_DISTRIBUTION_ID || 'E1G6EKS3JOFRU9' }}

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy configuration
        run: |
          echo "AWS_REGION=$AWS_REGION"
          echo "FRONTEND_BUCKET=$FRONTEND_BUCKET"
          echo "CLOUDFRONT_DISTRIBUTION_ID=$CLOUDFRONT_DISTRIBUTION_ID"
          if [[ -z "$AWS_ROLE_TO_ASSUME" ]]; then
            echo "AWS_ROLE_TO_ASSUME is empty"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload frontend to S3
        run: aws s3 sync frontend s3://${{ env.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths '/*'
