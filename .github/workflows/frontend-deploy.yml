name: Deploy Frontend (S3 + CloudFront)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          FRONTEND_BUCKET: ${{ vars.FRONTEND_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          missing=0
          if [[ -z "$AWS_ROLE_TO_ASSUME" ]]; then
            echo "Missing required secret: AWS_ROLE_TO_ASSUME"
            missing=1
          fi
          if [[ -z "$AWS_REGION" ]]; then
            echo "Missing required variable: AWS_REGION"
            missing=1
          fi
          if [[ -z "$FRONTEND_BUCKET" ]]; then
            echo "Missing required variable: FRONTEND_BUCKET"
            missing=1
          fi
          if [[ -z "$CLOUDFRONT_DISTRIBUTION_ID" ]]; then
            echo "Missing required variable: CLOUDFRONT_DISTRIBUTION_ID"
            missing=1
          fi
          if [[ "$missing" -eq 1 ]]; then
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload frontend to S3
        run: aws s3 sync frontend s3://${{ vars.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths '/*'
