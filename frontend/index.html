<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classroom Help Queue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <h1>Classroom Help Queue</h1>
        <p>Raise a question, track the queue, and close requests in real time.</p>
      </header>

      <section class="card">
        <h2>Create Ticket</h2>
        <form id="ticket-form" class="form-grid">
          <label>
            Student Name
            <input id="studentName" required maxlength="80" />
          </label>
          <label>
            Topic
            <input id="topic" required maxlength="120" />
          </label>
          <label>
            Urgency
            <select id="urgency">
              <option value="low">Low</option>
              <option value="normal" selected>Normal</option>
              <option value="high">High</option>
            </select>
          </label>
          <label class="full-width">
            Description
            <textarea id="description" rows="3" maxlength="300"></textarea>
          </label>
          <button type="submit">Submit Ticket</button>
        </form>
        <p id="form-message" class="message" aria-live="polite"></p>
      </section>

      <section class="card">
        <div class="row-between">
          <h2>Open Queue</h2>
          <button id="refresh-btn" class="secondary">Refresh</button>
        </div>
        <label class="admin-pin">
          Admin PIN (for status updates)
          <input id="adminPin" type="password" placeholder="Optional" />
        </label>
        <ul id="tickets" class="tickets"></ul>
        <p id="empty-state" class="message">No tickets yet.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
