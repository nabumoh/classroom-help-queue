AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Classroom Help Queue serverless stack
# No-op change to trigger backend CI deploy.

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 128
    CodeUri: ../backend/
    Environment:
      Variables:
        TICKETS_TABLE: !Ref TicketsTable
        ADMIN_PIN: !Ref AdminPin

Parameters:
  AdminPin:
    Type: String
    NoEcho: true
    Default: ""
    Description: Optional admin pin required for PATCH requests

Resources:
  HelpQueueApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'OPTIONS,GET,POST,PATCH'"
        AllowHeaders: "'Content-Type,x-admin-pin'"
        AllowOrigin: "'*'"

  TicketsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ticketId
          AttributeType: S
      KeySchema:
        - AttributeName: ticketId
          KeyType: HASH

  CreateTicketFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/createTicket.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TicketsTable
      Events:
        CreateTicket:
          Type: Api
          Properties:
            RestApiId: !Ref HelpQueueApi
            Path: /tickets
            Method: post

  ListTicketsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/listTickets.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TicketsTable
      Events:
        ListTickets:
          Type: Api
          Properties:
            RestApiId: !Ref HelpQueueApi
            Path: /tickets
            Method: get

  UpdateTicketStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/updateTicketStatus.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TicketsTable
      Events:
        UpdateTicketStatus:
          Type: Api
          Properties:
            RestApiId: !Ref HelpQueueApi
            Path: /tickets/{ticketId}
            Method: patch

Outputs:
  ApiBaseUrl:
    Description: Base URL for API Gateway stage
    Value: !Sub https://${HelpQueueApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  TicketsTableName:
    Value: !Ref TicketsTable
